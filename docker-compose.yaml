version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    # Comment out ports if you don't need external access
    # ports:
    #   - "27017:27017"

  todoapi:
    build: .
    container_name: todoapi
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/todoapp

volumes:
  mongo_data:
